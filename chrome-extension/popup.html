<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 240px;
    background: #0e0e14;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 16px;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .header img {
    width: 24px;
    height: 24px;
    border-radius: 6px;
  }
  .header span {
    font-size: 14px;
    font-weight: 600;
  }
  .header .red { color: #e74c3c; }
  .header .dim { color: rgba(255,255,255,0.5); }
  .setting {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
  }
  .setting-label {
    font-size: 12px;
    color: rgba(255,255,255,0.8);
  }
  .setting-desc {
    font-size: 10px;
    color: rgba(255,255,255,0.3);
    margin-top: 2px;
  }
  .toggle {
    position: relative;
    width: 36px;
    height: 20px;
    flex-shrink: 0;
    cursor: pointer;
  }
  .toggle input {
    opacity: 0;
    width: 0;
    height: 0;
  }
  .slider {
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    transition: background 0.2s;
  }
  .slider::before {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    left: 2px;
    top: 2px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .toggle input:checked + .slider {
    background: #e74c3c;
  }
  .toggle input:checked + .slider::before {
    transform: translateX(16px);
  }
</style>
</head>
<body>
  <div class="header">
    <img src="icons/chud.jpg" alt="">
    <span><span class="red">chud</span><span class="dim">.tech</span></span>
  </div>

  <div class="setting">
    <div>
      <div class="setting-label">Double-click search</div>
      <div class="setting-desc">Search Axiom on double-click</div>
    </div>
    <label class="toggle">
      <input type="checkbox" id="dblclick-toggle">
      <span class="slider"></span>
    </label>
  </div>

  <script src="popup.js"></script>
</body>
</html>
